<html>
<head>
    <title>Interactive Drag and Drop Simulation</title>
    <style>
        #drop-zone {
            width: 400px;
            height: 400px;
            border: 2px dashed #ccc;
            position: relative;
        }
        .draggable {
            width: 50px;
            height: 50px;
            background-color: #007bff;
            color: white;
            text-align: center;
            line-height: 50px;
            cursor: pointer;
            position: absolute;
        }
    </style>
</head>
<body>
    <h1>Drag and Drop Simulation</h1>
    <div id="drop-zone">
        <div class="draggable" draggable="true" id="drag1" style="top: 10px; left: 10px;">Drag me</div>
    </div>

    <script>
        const dragItem = document.getElementById("drag1");
        const dropZone = document.getElementById("drop-zone");

        dragItem.addEventListener("dragstart", () => {
            dragItem.classList.add("dragging");
        });

        dropZone.addEventListener("dragover", (e) => {
            e.preventDefault();
        });

        dropZone.addEventListener("drop", () => {
            dragItem.classList.remove("dragging");
            const x = event.clientX - dropZone.offsetLeft;
            const y = event.clientY - dropZone.offsetTop;
            dragItem.style.left = x + 'px';
            dragItem.style.top = y + 'px';
        });
    </script>
</body>
</html>
