<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitosis Simulation</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #simulation { border: 1px solid #ccc; padding: 20px; margin: 20px; display: flex; flex-direction: column; align-items: center; }
        .dropzone { width: 200px; height: 200px; border: 1px dashed #aaa; display: flex; justify-content: center; align-items: center; position: relative; }
        .draggable { width: 40px; height: 40px; background-color: lightblue; border: 1px solid #007BFF; border-radius: 5px; cursor: move; }
    </style>
</head>
<body>
    <h1>Interactive Mitosis Drag and Drop Simulation</h1>
    <div id="simulation">
        <div class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)">
            Drop Here
        </div>
        <div class="draggable" draggable="true" ondragstart="drag(event)">Cell</div>
    </div>
    <script>
        function allowDrop(event) {
            event.preventDefault();
        }
        function drag(event) {
            event.dataTransfer.setData("text", event.target.id);
        }
        function drop(event) {
            event.preventDefault();
            var data = event.dataTransfer.getData("text");
            event.target.appendChild(document.getElementById(data));
        }
    </script>
</body>
</html>
